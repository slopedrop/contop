<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 930 300">
  <defs>
    <marker id="af" markerWidth="6" markerHeight="5" refX="5" refY="2.5" orient="auto"><polygon points="0 0,6 2.5,0 5" fill="#095BB9"/></marker>
    <marker id="ab" markerWidth="6" markerHeight="5" refX="1" refY="2.5" orient="auto"><polygon points="6 0,0 2.5,6 5" fill="#095BB9"/></marker>
  </defs>

  <rect width="930" height="300" fill="#000"/>

  <!-- Your Phone -->
  <rect x="30" y="30" width="195" height="140" rx="10" fill="#0A0A0A" stroke="#1A1B1E"/>
  <text x="127" y="58" text-anchor="middle" fill="#FFF" font-family="system-ui,sans-serif" font-size="13" font-weight="700">Your Phone</text>
  <line x1="48" y1="68" x2="213" y2="68" stroke="#1A1B1E" stroke-width="0.5"/>
  <text x="48" y="92" fill="#999" font-family="system-ui,sans-serif" font-size="11">Voice / Text Input</text>
  <text x="48" y="114" fill="#999" font-family="system-ui,sans-serif" font-size="11">Live Feed</text>

  <!-- Contop Server -->
  <rect x="342" y="30" width="240" height="140" rx="10" fill="#0A0A0A" stroke="#1A1B1E"/>
  <text x="462" y="58" text-anchor="middle" fill="#FFF" font-family="system-ui,sans-serif" font-size="13" font-weight="700">Contop Server</text>
  <line x1="360" y1="68" x2="570" y2="68" stroke="#1A1B1E" stroke-width="0.5"/>
  <text x="360" y="92" fill="#999" font-family="system-ui,sans-serif" font-size="11">ADK Agent — 30+ Tools</text>
  <text x="360" y="114" fill="#999" font-family="system-ui,sans-serif" font-size="11">Dual-Tool Evaluator</text>
  <text x="360" y="136" fill="#999" font-family="system-ui,sans-serif" font-size="11">Skills Engine</text>

  <!-- Desktop Host -->
  <rect x="700" y="30" width="200" height="140" rx="10" fill="#0A0A0A" stroke="#1A1B1E"/>
  <text x="800" y="58" text-anchor="middle" fill="#FFF" font-family="system-ui,sans-serif" font-size="13" font-weight="700">Desktop Host</text>
  <line x1="718" y1="68" x2="888" y2="68" stroke="#1A1B1E" stroke-width="0.5"/>
  <text x="718" y="92" fill="#999" font-family="system-ui,sans-serif" font-size="11">Screenshots + UI</text>
  <text x="718" y="114" fill="#999" font-family="system-ui,sans-serif" font-size="11">CLI / GUI Actions</text>
  <text x="718" y="136" fill="#999" font-family="system-ui,sans-serif" font-size="11">Manual Control</text>

  <!-- CLI Proxy -->
  <rect x="396" y="232" width="148" height="48" rx="8" fill="#0A0A0A" stroke="#1A1B1E"/>
  <text x="470" y="254" text-anchor="middle" fill="#FFF" font-family="system-ui,sans-serif" font-size="11" font-weight="600">CLI Proxy</text>
  <text x="470" y="270" text-anchor="middle" fill="#666" font-family="system-ui,sans-serif" font-size="9">Subscription Mode</text>

  <!-- 1. Phone <-> Server: WebRTC P2P Data Channel (solid, bidirectional) -->
  <line x1="225" y1="84" x2="342" y2="84" stroke="#095BB9" stroke-width="1.5" marker-start="url(#ab)" marker-end="url(#af)"/>
  <text x="283" y="74" text-anchor="middle" fill="#DDD" font-family="system-ui,sans-serif" font-size="8">WebRTC P2P Data Channel</text>

  <!-- 2. Server -> Phone: progress / results / video (solid) -->
  <line x1="342" y1="128" x2="225" y2="128" stroke="#095BB9" stroke-width="1.5" marker-end="url(#af)"/>
  <text x="283" y="144" text-anchor="middle" fill="#999" font-family="system-ui,sans-serif" font-size="8">progress / results / video</text>

  <!-- 3. Server -> Desktop: observe (solid) -->
  <line x1="582" y1="84" x2="700" y2="84" stroke="#095BB9" stroke-width="1.5" marker-end="url(#af)"/>
  <text x="641" y="74" text-anchor="middle" fill="#DDD" font-family="system-ui,sans-serif" font-size="9" font-weight="600">observe</text>

  <!-- 4. Server -> Desktop: execute (solid) -->
  <line x1="582" y1="128" x2="700" y2="128" stroke="#095BB9" stroke-width="1.5" marker-end="url(#af)"/>
  <text x="641" y="144" text-anchor="middle" fill="#DDD" font-family="system-ui,sans-serif" font-size="9" font-weight="600">execute</text>

  <!-- 5. Server -> CLI Proxy: subscription (dashed = optional path) -->
  <line x1="470" y1="170" x2="470" y2="232" stroke="#095BB9" stroke-width="1.5" stroke-dasharray="5 3" marker-end="url(#af)"/>
  <text x="484" y="206" fill="#999" font-family="system-ui,sans-serif" font-size="8">subscription</text>

  <!-- 6. CLI Proxy -> Desktop: CLI tool (dashed = optional path) -->
  <path d="M544,256 H800 V170" stroke="#095BB9" stroke-width="1.5" stroke-dasharray="5 3" fill="none" marker-end="url(#af)"/>
  <text x="672" y="248" text-anchor="middle" fill="#999" font-family="system-ui,sans-serif" font-size="8">CLI tool</text>
</svg>

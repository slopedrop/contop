name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  server-tests:
    name: Server Tests (Python)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: contop-server

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Run tests
        run: xvfb-run uv run pytest tests/ --tb=short -q

  mobile-tests:
    name: Mobile Tests (Jest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: contop-mobile

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npx jest --passWithNoTests

  desktop-typecheck:
    name: Desktop Typecheck
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: contop-desktop

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npx tsc --noEmit

  website-build:
    name: Website Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: website

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

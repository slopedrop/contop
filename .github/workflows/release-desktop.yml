name: Release Desktop

on:
  push:
    tags:
      - "desktop-v*"

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            platform: windows
            bundle_targets: nsis
            artifact_glob: "contop-desktop/src-tauri/target/release/bundle/nsis/*.exe"
            create_portable_zip: true
          - os: macos-latest
            platform: macos
            bundle_targets: dmg
            artifact_glob: "contop-desktop/src-tauri/target/release/bundle/dmg/*.dmg"
          - os: ubuntu-22.04
            platform: linux
            bundle_targets: deb,appimage
            artifact_glob: "contop-desktop/src-tauri/target/release/bundle/{deb,appimage}/*"

    runs-on: ${{ matrix.os }}

    steps:
      - name: Validate tag format
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          if [[ ! "$TAG" =~ ^desktop-v[0-9]+\.[0-9]+\.[0-9]+ ]]; then
            echo "::error::Invalid tag format: $TAG. Expected: desktop-vX.Y.Z"
            exit 1
          fi
        shell: bash

      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: contop-desktop/src-tauri

      - name: Install Linux system dependencies
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install frontend dependencies
        run: cd contop-desktop && npm ci
        shell: bash

      - name: Stage desktop resources
        run: bash scripts/stage-desktop-resources.sh
        shell: bash
        env:
          CONTOP_PLATFORM: ${{ matrix.platform }}

      - name: Build Tauri app
        run: cd contop-desktop && npx tauri build --bundles ${{ matrix.bundle_targets }}
        shell: bash
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

      - name: Determine release info
        id: release_info
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          VERSION="${TAG#desktop-}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          if [[ "$TAG" =~ -(alpha|beta|rc) ]]; then
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
          else
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
          fi
        shell: bash

      - name: Create portable zip (Windows)
        if: matrix.create_portable_zip == true
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          VERSION="${TAG#desktop-v}"
          RELEASE_DIR="contop-desktop/src-tauri/target/release"
          ZIP_NAME="Contop-Desktop_${VERSION}_x64-portable.zip"

          mkdir -p portable-staging dist
          cp "$RELEASE_DIR/contop-desktop.exe" portable-staging/
          cp -r "$RELEASE_DIR/resources" portable-staging/ 2>/dev/null || true

          cd portable-staging
          7z a -tzip "../dist/$ZIP_NAME" ./*
          cd ..
          echo "Created portable zip: $ZIP_NAME"
        shell: bash

      - name: Collect artifacts
        id: artifacts
        run: |
          mkdir -p dist
          cp ${{ matrix.artifact_glob }} dist/ 2>/dev/null || true
          LATEST_JSON=$(find contop-desktop/src-tauri/target/release/bundle -name "latest.json" 2>/dev/null | head -1)
          if [[ -n "$LATEST_JSON" ]]; then
            cp "$LATEST_JSON" "dist/latest-${{ matrix.platform }}.json"
          fi
          ls -la dist/
        shell: bash

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: desktop-${{ matrix.platform }}
          path: dist/*

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Determine release info
        id: release_info
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          VERSION="${TAG#desktop-}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          if [[ "$TAG" =~ -(alpha|beta|rc) ]]; then
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
          else
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: List artifacts
        run: ls -la artifacts/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release_info.outputs.tag }}
          name: Desktop ${{ steps.release_info.outputs.version }}
          prerelease: ${{ steps.release_info.outputs.prerelease }}
          generate_release_notes: true
          files: artifacts/*

  update-package-managers:
    needs: release
    runs-on: ubuntu-latest

    steps:
      - name: Determine version
        id: version
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          VERSION="${TAG#desktop-v}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Compute SHA256 hashes
        id: hashes
        run: |
          DMG=$(find artifacts -name '*.dmg' | head -1)
          ZIP=$(find artifacts -name '*portable.zip' | head -1)

          if [[ -n "$DMG" ]]; then
            DMG_SHA=$(sha256sum "$DMG" | awk '{print $1}')
            echo "dmg_sha=$DMG_SHA" >> "$GITHUB_OUTPUT"
            echo "DMG hash: $DMG_SHA"
          fi

          if [[ -n "$ZIP" ]]; then
            ZIP_SHA=$(sha256sum "$ZIP" | awk '{print $1}')
            echo "zip_sha=$ZIP_SHA" >> "$GITHUB_OUTPUT"
            echo "ZIP hash: $ZIP_SHA"
          fi

      - name: Update Homebrew tap
        if: steps.hashes.outputs.dmg_sha
        env:
          GH_TOKEN: ${{ secrets.PACKAGE_MANAGER_TOKEN }}
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          SHA="${{ steps.hashes.outputs.dmg_sha }}"

          git clone https://x-access-token:${GH_TOKEN}@github.com/slopedrop/homebrew-contop.git
          cd homebrew-contop

          cat > Casks/contop.rb << 'CASK_EOF'
          cask "contop" do
            version "VERSION_PLACEHOLDER"
            sha256 "SHA_PLACEHOLDER"

            url "https://github.com/slopedrop/contop/releases/download/desktop-v#{version}/Contop.Desktop_#{version}_aarch64.dmg"
            name "Contop Desktop"
            desc "AI-powered remote desktop control from your phone"
            homepage "https://contop.app"

            depends_on macos: ">= :ventura"

            app "Contop Desktop.app"

            zap trash: [
              "~/Library/Application Support/com.mmssw.contop-desktop",
              "~/Library/Caches/com.mmssw.contop-desktop",
              "~/.contop",
            ]
          end
          CASK_EOF

          # Replace placeholders with actual values
          sed -i "s/VERSION_PLACEHOLDER/$VERSION/" Casks/contop.rb
          sed -i "s/SHA_PLACEHOLDER/$SHA/" Casks/contop.rb

          # Fix indentation (heredoc adds leading spaces)
          sed -i 's/^          //' Casks/contop.rb

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Casks/contop.rb
          git commit -m "Update contop to $VERSION" || echo "No changes to commit"
          git push

      - name: Update Scoop bucket
        if: steps.hashes.outputs.zip_sha
        env:
          GH_TOKEN: ${{ secrets.PACKAGE_MANAGER_TOKEN }}
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          SHA="${{ steps.hashes.outputs.zip_sha }}"

          git clone https://x-access-token:${GH_TOKEN}@github.com/slopedrop/scoop-contop.git
          cd scoop-contop

          cat > bucket/contop.json << EOF
          {
            "version": "$VERSION",
            "description": "AI-powered remote desktop control from your phone",
            "homepage": "https://contop.app",
            "license": "MIT",
            "url": "https://github.com/slopedrop/contop/releases/download/desktop-v$VERSION/Contop-Desktop_${VERSION}_x64-portable.zip",
            "hash": "$SHA",
            "extract_dir": ".",
            "bin": "contop-desktop.exe",
            "shortcuts": [
              ["contop-desktop.exe", "Contop Desktop"]
            ],
            "checkver": {
              "github": "https://github.com/slopedrop/contop",
              "regex": "desktop-v([\\\\d.]+-?[\\\\w.]*)"
            }
          }
          EOF

          # Fix indentation
          sed -i 's/^          //' bucket/contop.json

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add bucket/contop.json
          git commit -m "Update contop to $VERSION" || echo "No changes to commit"
          git push

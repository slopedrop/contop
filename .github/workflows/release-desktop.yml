name: Release Desktop

on:
  push:
    tags:
      - "desktop-v*"

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            platform: windows
            bundle_targets: nsis
            artifact_glob: "contop-desktop/src-tauri/target/release/bundle/nsis/*.exe"
          - os: macos-latest
            platform: macos
            bundle_targets: dmg
            artifact_glob: "contop-desktop/src-tauri/target/release/bundle/dmg/*.dmg"
          - os: ubuntu-22.04
            platform: linux
            bundle_targets: deb,appimage
            artifact_glob: "contop-desktop/src-tauri/target/release/bundle/{deb,appimage}/*"

    runs-on: ${{ matrix.os }}

    steps:
      - name: Validate tag format
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          if [[ ! "$TAG" =~ ^desktop-v[0-9]+\.[0-9]+\.[0-9]+ ]]; then
            echo "::error::Invalid tag format: $TAG. Expected: desktop-vX.Y.Z"
            exit 1
          fi
        shell: bash

      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: contop-desktop/src-tauri

      - name: Install Linux system dependencies
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install frontend dependencies
        run: cd contop-desktop && npm ci
        shell: bash

      - name: Stage desktop resources
        run: bash scripts/stage-desktop-resources.sh
        shell: bash
        env:
          CONTOP_PLATFORM: ${{ matrix.platform }}

      - name: Build Tauri app
        run: cd contop-desktop && npx tauri build --bundles ${{ matrix.bundle_targets }}
        shell: bash
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

      - name: Determine release info
        id: release_info
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          VERSION="${TAG#desktop-}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          if [[ "$TAG" =~ -(alpha|beta|rc) ]]; then
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
          else
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
          fi
        shell: bash

      - name: Collect artifacts
        id: artifacts
        run: |
          mkdir -p dist
          cp ${{ matrix.artifact_glob }} dist/ 2>/dev/null || true
          LATEST_JSON=$(find contop-desktop/src-tauri/target/release/bundle -name "latest.json" 2>/dev/null | head -1)
          if [[ -n "$LATEST_JSON" ]]; then
            cp "$LATEST_JSON" "dist/latest-${{ matrix.platform }}.json"
          fi
          ls -la dist/
        shell: bash

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: desktop-${{ matrix.platform }}
          path: dist/*

  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Determine release info
        id: release_info
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          VERSION="${TAG#desktop-}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          if [[ "$TAG" =~ -(alpha|beta|rc) ]]; then
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
          else
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: List artifacts
        run: ls -la artifacts/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release_info.outputs.tag }}
          name: Desktop ${{ steps.release_info.outputs.version }}
          prerelease: ${{ steps.release_info.outputs.prerelease }}
          generate_release_notes: true
          files: artifacts/*

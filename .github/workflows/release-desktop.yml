name: Release Desktop

on:
  push:
    tags:
      - "desktop-v*"

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Validate tag format
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          if [[ ! "$TAG" =~ ^desktop-v[0-9]+\.[0-9]+\.[0-9]+ ]]; then
            echo "::error::Invalid tag format: $TAG. Expected: desktop-vX.Y.Z"
            exit 1
          fi
        shell: bash

      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: contop-desktop/src-tauri

      - name: Install frontend dependencies
        run: cd contop-desktop && npm ci
        shell: bash

      - name: Stage desktop resources
        run: bash scripts/stage-desktop-resources.sh
        shell: bash

      - name: Build Tauri app
        run: cd contop-desktop && npx tauri build
        shell: bash
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

      - name: Determine release info
        id: release_info
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          VERSION="${TAG#desktop-}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          if [[ "$TAG" =~ -(alpha|beta|rc) ]]; then
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
          else
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
          fi
        shell: bash

      - name: Find build artifacts
        id: artifacts
        run: |
          NSIS_EXE=$(find contop-desktop/src-tauri/target/release/bundle/nsis -name "*.exe" | head -1)
          LATEST_JSON=$(find contop-desktop/src-tauri/target/release/bundle -name "latest.json" | head -1)
          echo "nsis_exe=$NSIS_EXE" >> "$GITHUB_OUTPUT"
          echo "latest_json=$LATEST_JSON" >> "$GITHUB_OUTPUT"
        shell: bash

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release_info.outputs.tag }}
          name: Desktop ${{ steps.release_info.outputs.version }}
          prerelease: ${{ steps.release_info.outputs.prerelease }}
          generate_release_notes: true
          files: |
            ${{ steps.artifacts.outputs.nsis_exe }}
            ${{ steps.artifacts.outputs.latest_json }}

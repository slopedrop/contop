name: OTA Update Mobile

on:
  push:
    tags:
      - "ota-v*"
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Install dependencies
        run: cd contop-mobile && npm ci

      - name: Push OTA update
        run: |
          cd contop-mobile
          eas update --branch production --message "${{ github.event.head_commit.message || 'Manual OTA update' }}" --non-interactive

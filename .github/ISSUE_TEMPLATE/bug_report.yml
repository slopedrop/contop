name: Bug Report
description: Report a bug or unexpected behavior
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: Describe the bug
      description: A clear description of what happened
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: How can we reproduce this?
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
  - type: dropdown
    id: component
    attributes:
      label: Component
      options:
        - Desktop App
        - Mobile App
        - Server / AI Backend
        - Website
        - Other
  - type: input
    id: os
    attributes:
      label: OS and version
      placeholder: "e.g., Windows 11 23H2, Android 14"
  - type: textarea
    id: logs
    attributes:
      label: Logs or screenshots
      description: Paste any relevant logs or attach screenshots

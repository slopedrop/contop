name: vscode-claude-reject
description: Reject Claude Code's pending suggestion or diff
steps:
  - action: hotkey
    keys: [ctrl, shift, p]
  - action: wait
    seconds: 0.5
  - action: type_text
    text: "Claude Code: Reject"
  - action: wait
    seconds: 0.3
  - action: hotkey
    keys: [enter]

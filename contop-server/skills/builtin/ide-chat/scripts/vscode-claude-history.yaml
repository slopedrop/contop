name: vscode-claude-history
description: Open Claude Code chat history picker in VS Code
steps:
  - action: hotkey
    keys: [ctrl, shift, p]
  - action: wait
    seconds: 0.5
  - action: type_text
    text: "Claude Code: Open History"
  - action: wait
    seconds: 0.3
  - action: hotkey
    keys: [enter]
